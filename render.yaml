services:
  - type: web
    name: cambiofacil-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REDIS_URL
        sync: false   # você preenche no painel do Render com a URL do Upstash
      - key: RATE_CACHE_TTL
        value: "900"
